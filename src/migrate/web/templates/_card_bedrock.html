<div class="bg-ink-900 border border-amber-700/40 rounded-lg overflow-hidden">
  <div class="px-6 py-4 border-b border-ink-700 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full {% if state.bedrock.region %}bg-emerald-500{% else %}bg-slate-600{% endif %}"></div>
      <h2 class="font-semibold text-slate-100">AWS Bedrock <span class="text-xs text-slate-500 font-normal">(Claude on AWS)</span></h2>
    </div>
    {% if result and result.saved %}<span class="text-xs text-emerald-400">Saved</span>{% endif %}
  </div>
  <form class="px-6 py-5 space-y-4"
        hx-post="/connections/bedrock/save"
        hx-target="closest div.bg-ink-900"
        hx-swap="outerHTML">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-400 mb-1">AWS region</label>
        <input type="text" name="aws_region" value="{{ state.bedrock.region }}"
               placeholder="us-east-1"
               class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Bedrock model ID</label>
        <select name="bedrock_model_id" class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm">
          {% for m in [
            "anthropic.claude-sonnet-4-20250514-v1:0",
            "anthropic.claude-3-5-sonnet-20241022-v2:0",
            "anthropic.claude-3-5-haiku-20241022-v1:0",
            "anthropic.claude-3-opus-20240229-v1:0",
            "anthropic.claude-3-sonnet-20240229-v1:0"
          ] %}
            <option value="{{ m }}" {% if state.bedrock.model_id == m %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="text-xs text-slate-500">
      Auth: AWS credentials from boto3 chain (env vars, <code>~/.aws/credentials</code>, IAM role).
      Optionally override with explicit keys below.
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-slate-500 mb-1">
          AWS_ACCESS_KEY_ID <span class="text-slate-600">(optional)</span>
          {% if state.bedrock.has_aws_key %}
            <span class="text-slate-600 font-normal ml-1">(currently {{ state.bedrock.aws_key_masked }})</span>
          {% endif %}
        </label>
        <input type="password" name="aws_access_key_id"
               placeholder="{% if state.bedrock.has_aws_key %}••••••••{% else %}AKIA…{% endif %}"
               class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-xs focus:border-accent-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">AWS_SECRET_ACCESS_KEY <span class="text-slate-600">(optional)</span></label>
        <input type="password" name="aws_secret_access_key"
               placeholder="leave empty to use chain"
               class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-xs focus:border-accent-500 focus:outline-none" />
      </div>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="button"
              hx-post="/connections/bedrock/test"
              hx-target="#test-result-bedrock"
              hx-swap="innerHTML"
              class="px-4 py-2 text-sm rounded bg-ink-800 border border-ink-700 hover:bg-ink-700 hover:border-accent-600 transition-colors">
        Test connection
      </button>
      <button type="submit"
              class="px-4 py-2 text-sm rounded bg-accent-600 hover:bg-accent-700 text-ink-950 font-medium transition-colors">
        Save
      </button>
      <div id="test-result-bedrock" class="flex-1"></div>
    </div>
  </form>
</div>
