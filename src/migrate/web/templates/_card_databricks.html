<div class="bg-ink-900 border border-ink-700 rounded-lg overflow-hidden">
  <div class="px-6 py-4 border-b border-ink-700 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full {% if state.databricks.host and state.databricks.has_token %}bg-emerald-500{% else %}bg-slate-600{% endif %}"></div>
      <h2 class="font-semibold text-slate-100">Databricks</h2>
    </div>
    {% if result and result.saved %}<span class="text-xs text-emerald-400">Saved</span>{% endif %}
  </div>
  <form class="px-6 py-5 space-y-4"
        hx-post="/connections/databricks/save"
        hx-target="#card-databricks"
        hx-swap="innerHTML">
    <div>
      <label class="block text-sm text-slate-400 mb-1">Workspace URL</label>
      <input type="text" name="databricks_host"
             value="{{ state.databricks.host }}"
             placeholder="https://your-workspace.cloud.databricks.com"
             class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">
        Personal Access Token
        {% if state.databricks.has_token %}
          <span class="text-slate-500 font-normal">(currently {{ state.databricks.token_masked }} — leave empty to keep)</span>
        {% endif %}
      </label>
      <input type="password" name="databricks_token"
             placeholder="{% if state.databricks.has_token %}••••••••{% else %}dapi…{% endif %}"
             class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Default catalog</label>
        <input type="text" name="databricks_default_catalog"
               value="{{ state.databricks.default_catalog }}"
               placeholder="migrated_from_gcp"
               class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">SQL Warehouse ID</label>
        <input type="text" name="databricks_sql_warehouse_id"
               value="{{ state.databricks.warehouse_id }}"
               placeholder="abc123def456"
               class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
      </div>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="button"
              hx-post="/connections/databricks/test"
              hx-target="#test-result-databricks"
              hx-swap="innerHTML"
              class="px-4 py-2 text-sm rounded bg-ink-800 border border-ink-700 hover:bg-ink-700 hover:border-accent-600 transition-colors">
        Test connection
      </button>
      <button type="submit"
              class="px-4 py-2 text-sm rounded bg-accent-600 hover:bg-accent-700 text-ink-950 font-medium transition-colors">
        Save
      </button>
      <div id="test-result-databricks" class="flex-1"></div>
    </div>
  </form>
</div>
