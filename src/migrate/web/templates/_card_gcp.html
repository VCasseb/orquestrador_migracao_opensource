<div class="bg-ink-900 border border-ink-700 rounded-lg overflow-hidden" id="card-gcp-inner">
  <div class="px-6 py-4 border-b border-ink-700 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full {% if state.gcp.project_ids %}bg-emerald-500{% else %}bg-slate-600{% endif %}"></div>
      <h2 class="font-semibold text-slate-100">GCP / BigQuery</h2>
    </div>
    {% if result and result.saved %}<span class="text-xs text-emerald-400">Saved</span>{% endif %}
  </div>
  <form class="px-6 py-5 space-y-4"
        hx-post="/connections/gcp/save"
        hx-target="#card-gcp"
        hx-swap="innerHTML">
    <div>
      <label class="block text-sm text-slate-400 mb-1">Service Account JSON path <span class="text-slate-600 font-normal">(optional — leave empty to use ADC)</span></label>
      <input type="text" name="gcp_service_account_json"
             value="{{ state.gcp.service_account_json }}"
             placeholder="/path/to/sa.json (or empty for `gcloud auth application-default login`)"
             class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Project IDs <span class="text-slate-600 font-normal">(comma-separated)</span></label>
      <input type="text" name="gcp_project_ids"
             value="{{ state.gcp.project_ids }}"
             placeholder="prj-finance-prod,prj-marketing-prod,prj-data-prod"
             class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="button"
              hx-post="/connections/gcp/test"
              hx-target="#test-result-gcp"
              hx-swap="innerHTML"
              class="px-4 py-2 text-sm rounded bg-ink-800 border border-ink-700 hover:bg-ink-700 hover:border-accent-600 transition-colors">
        Test connection
      </button>
      <button type="submit"
              class="px-4 py-2 text-sm rounded bg-accent-600 hover:bg-accent-700 text-ink-950 font-medium transition-colors">
        Save
      </button>
      <div id="test-result-gcp" class="flex-1"></div>
    </div>
  </form>
</div>
