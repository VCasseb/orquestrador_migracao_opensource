<div class="bg-ink-900 border border-blue-700/40 rounded-lg overflow-hidden">
  <div class="px-6 py-4 border-b border-ink-700 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full {% if state.gemini.has_key %}bg-emerald-500{% else %}bg-slate-600{% endif %}"></div>
      <h2 class="font-semibold text-slate-100">Gemini <span class="text-xs text-slate-500 font-normal">(Google AI)</span></h2>
    </div>
    {% if result and result.saved %}<span class="text-xs text-emerald-400">Saved</span>{% endif %}
  </div>
  <form class="px-6 py-5 space-y-4"
        hx-post="/connections/gemini/save"
        hx-target="closest div.bg-ink-900"
        hx-swap="outerHTML">
    <div>
      <label class="block text-sm text-slate-400 mb-1">
        API Key
        {% if state.gemini.has_key %}
          <span class="text-slate-500 font-normal">(currently {{ state.gemini.api_key_masked }} — leave empty to keep)</span>
        {% endif %}
      </label>
      <input type="password" name="gemini_api_key"
             placeholder="{% if state.gemini.has_key %}••••••••{% else %}AIza…{% endif %}"
             class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Default model</label>
      <select name="gemini_model"
              class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none">
        {% for m in ["gemini-2.0-flash", "gemini-2.0-flash-thinking-exp", "gemini-1.5-pro", "gemini-1.5-flash"] %}
          <option value="{{ m }}" {% if state.gemini.model == m %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="button"
              hx-post="/connections/gemini/test"
              hx-target="#test-result-gemini"
              hx-swap="innerHTML"
              class="px-4 py-2 text-sm rounded bg-ink-800 border border-ink-700 hover:bg-ink-700 hover:border-accent-600 transition-colors">
        Test connection
      </button>
      <button type="submit"
              class="px-4 py-2 text-sm rounded bg-accent-600 hover:bg-accent-700 text-ink-950 font-medium transition-colors">
        Save
      </button>
      <div id="test-result-gemini" class="flex-1"></div>
    </div>
  </form>
</div>
