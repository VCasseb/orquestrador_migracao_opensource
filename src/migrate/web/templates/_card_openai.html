<div class="bg-ink-900 border border-green-700/40 rounded-lg overflow-hidden">
  <div class="px-6 py-4 border-b border-ink-700 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full {% if state.openai.has_key %}bg-emerald-500{% else %}bg-slate-600{% endif %}"></div>
      <h2 class="font-semibold text-slate-100">OpenAI <span class="text-xs text-slate-500 font-normal">(GPT)</span></h2>
    </div>
    {% if result and result.saved %}<span class="text-xs text-emerald-400">Saved</span>{% endif %}
  </div>
  <form class="px-6 py-5 space-y-4"
        hx-post="/connections/openai/save"
        hx-target="closest div.bg-ink-900"
        hx-swap="outerHTML">
    <div>
      <label class="block text-sm text-slate-400 mb-1">
        API Key
        {% if state.openai.has_key %}
          <span class="text-slate-500 font-normal">(currently {{ state.openai.api_key_masked }} — leave empty to keep)</span>
        {% endif %}
      </label>
      <input type="password" name="openai_api_key"
             placeholder="{% if state.openai.has_key %}••••••••{% else %}sk-…{% endif %}"
             class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Default model</label>
      <select name="openai_model"
              class="w-full bg-ink-800 border border-ink-700 rounded px-3 py-2 text-sm focus:border-accent-500 focus:outline-none">
        {% for m in ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo", "gpt-3.5-turbo", "o1-preview", "o1-mini"] %}
          <option value="{{ m }}" {% if state.openai.model == m %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="button"
              hx-post="/connections/openai/test"
              hx-target="#test-result-openai"
              hx-swap="innerHTML"
              class="px-4 py-2 text-sm rounded bg-ink-800 border border-ink-700 hover:bg-ink-700 hover:border-accent-600 transition-colors">
        Test connection
      </button>
      <button type="submit"
              class="px-4 py-2 text-sm rounded bg-accent-600 hover:bg-accent-700 text-ink-950 font-medium transition-colors">
        Save
      </button>
      <div id="test-result-openai" class="flex-1"></div>
    </div>
  </form>
</div>
