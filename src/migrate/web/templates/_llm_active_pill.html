<div class="flex items-center gap-3 px-4 py-3 bg-ink-900 border border-ink-700 rounded-lg mb-4">
  <span class="text-xs uppercase tracking-wider text-slate-500">Active LLM provider</span>
  <span class="px-3 py-1 rounded-full text-sm font-semibold
               {% if state.active_llm == 'anthropic' %}bg-purple-950/40 border border-purple-800/40 text-purple-300
               {% elif state.active_llm == 'openai' %}bg-green-950/40 border border-green-800/40 text-green-300
               {% elif state.active_llm == 'gemini' %}bg-blue-950/40 border border-blue-800/40 text-blue-300
               {% elif state.active_llm == 'bedrock' %}bg-amber-950/40 border border-amber-800/40 text-amber-300
               {% endif %}">
    {{ state.active_llm }}
  </span>
  <span class="text-xs text-slate-500">— used by all conversion calls (DAGs, notebooks, SQL fallback)</span>
</div>
