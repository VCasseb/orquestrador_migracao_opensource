<div class="bg-ink-900 border border-ink-700 rounded-lg overflow-hidden">
  <div class="px-6 py-3 border-b border-ink-700">
    <h3 class="font-semibold text-slate-100">{{ plan.name }}</h3>
    <div class="text-xs text-slate-500">created {{ plan.created_at.strftime('%Y-%m-%d %H:%M UTC') }}</div>
  </div>
  <div class="divide-y divide-ink-800">
    {% for w in plan.waves %}
    <div class="px-6 py-3">
      <div class="text-sm font-semibold text-slate-200">Wave {{ w.index }} <span class="text-xs text-slate-500 font-normal">({{ w.items|length }})</span></div>
      <div class="mt-1 grid grid-cols-2 gap-1 text-xs font-mono text-slate-400">
        {% for it in w.items %}<div>{{ it.fqn }}</div>{% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
